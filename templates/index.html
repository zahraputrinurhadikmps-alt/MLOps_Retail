<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediksi Penjualan Ritel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    background:#edf2f7;
    font-family:'Segoe UI',sans-serif;
}

.container{
    max-width:1100px;
    margin-top:40px;
    margin-bottom:40px;
}

.card{
    border:none;
    border-radius:25px;
    padding:50px;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

/*======================
        JUDUL
=======================*/

.title{
    text-align:center;
    font-size:60px;
    font-weight:800;
    color:#0d6efd;
}

.title i{
    font-size:60px;
}

.subtitle{
    text-align:center;
    color:#6c757d;
    font-size:30px;
    margin-bottom:45px;
}

/*======================
        LABEL
=======================*/

.form-label{
    font-size:30px;
    font-weight:700;
    margin-bottom:12px;
}

/*======================
        INPUT
=======================*/

.form-control,
.form-select{
    height:75px;
    font-size:26px;
    border-radius:12px;
}

/*======================
        BUTTON
=======================*/

.btn{
    height:75px;
    font-size:30px;
    font-weight:bold;
    border-radius:12px;
}

.btn i{
    margin-right:8px;
}

/*======================
      HASIL PREDIKSI
=======================*/

.result{
    margin-top:45px;
    background:#eefbea;
    border-left:10px solid green;
    border-radius:15px;
    padding:40px;
    text-align:center;
}

.result h2{
    color:green;
    font-size:45px;
    font-weight:bold;
}

.result h1{
    color:#0d6efd;
    font-size:80px;
    font-weight:800;
}

hr{
    margin:25px 0;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">
<i class="fa-solid fa-cart-shopping"></i>
Prediksi Penjualan Ritel
</div>

<div class="subtitle">
Machine Learning Deployment menggunakan Flask
</div>

<form action="/predict" method="POST">

<div class="row">

<!-- Tanggal -->
<div class="col-md-6 mb-4">

<label class="form-label">Tanggal Penjualan</label>

<input
type="date"
name="sale_date"
class="form-control"
value="{{ sale_date if sale_date else '' }}"
required>

</div>

<!-- Waktu -->
<div class="col-md-6 mb-4">

<label class="form-label">Waktu Penjualan</label>

<input
type="time"
name="sale_time"
class="form-control"
value="{{ sale_time if sale_time else '' }}"
required>

</div>

<!-- Gender -->
<div class="col-md-6 mb-4">

<label class="form-label">Jenis Kelamin</label>

<select class="form-select" name="gender">

<option value="Male"
{% if gender=="Male" %}selected{% endif %}>
Laki-laki
</option>

<option value="Female"
{% if gender=="Female" %}selected{% endif %}>
Perempuan
</option>

</select>

</div>

<!-- Umur -->
<div class="col-md-6 mb-4">

<label class="form-label">Usia</label>

<input
type="number"
name="age"
class="form-control"
value="{{ age if age else '' }}"
required>

</div>

<!-- Kategori -->
<div class="col-md-6 mb-4">

<label class="form-label">Kategori</label>

<select class="form-select" name="category">

<option value="Clothing"
{% if category=="Clothing" %}selected{% endif %}>
Pakaian
</option>

<option value="Beauty"
{% if category=="Beauty" %}selected{% endif %}>
Kecantikan
</option>

<option value="Electronics"
{% if category=="Electronics" %}selected{% endif %}>
Elektronik
</option>

</select>

</div>

<!-- Kuantitas -->
<div class="col-md-6 mb-4">

<label class="form-label">Kuantitas</label>

<input
type="number"
name="quantiy"
class="form-control"
value="{{ quantiy if quantiy else '' }}"
required>

</div>

<!-- Harga -->
<div class="col-md-6 mb-4">

<label class="form-label">Harga Per Unit</label>

<input
type="number"
step="0.01"
name="price_per_unit"
class="form-control"
value="{{ price_per_unit if price_per_unit else '' }}"
required>

</div>

<!-- COGS -->
<div class="col-md-6 mb-4">

<label class="form-label">COGS</label>

<input
type="number"
step="0.01"
name="cogs"
class="form-control"
value="{{ cogs if cogs else '' }}"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 d-grid">

<button class="btn btn-primary">

<i class="fa-solid fa-chart-line"></i>

Prediksi

</button>

</div>

<div class="col-md-6 d-grid">

<button type="reset" class="btn btn-secondary">

<i class="fa-solid fa-rotate-right"></i>

Reset

</button>

</div>

</div>

</form>

{% if prediction is defined and prediction is not none %}

<div class="result">

<h2>

<i class="fa-solid fa-sack-dollar"></i>

Hasil Prediksi

</h2>

<hr>

<h1>

Rp {{ "{:,.2f}".format(prediction) }}

</h1>

</div>

{% endif %}

</div>

</div>

</body>

</html>
